name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10 é o mínimo declarado no pyproject; 3.12 é o que os
        # consumidores usam hoje (Ygg, Congresso, Vaire). Testar os dois
        # extremos evita usar sintaxe nova sem perceber e quebrar o piso.
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,anthropic]"

      - name: Testes
        run: python -m pytest -q

      # Esta lib é dependência de Ygg, Congresso e Vaire ao mesmo tempo: um
      # erro de import aqui quebra os três de uma vez. O smoke garante que o
      # pacote é importável e que o default local-first vale mesmo sem
      # nenhuma variável de ambiente.
      - name: Importa e resolve o provedor padrão
        run: |
          python -c "
          from llm_br import get_llm, Mensagem, LLMError, extrair_json
          from llm_br.tools import Registro
          llm = get_llm(env={})
          assert llm.nome == 'ollama', llm.nome
          assert extrair_json('\`\`\`json\n{\"a\":1}\n\`\`\`') == {'a': 1}
          print('ok:', llm.identificacao)
          "
